project:
  type: book
  output-dir: docs

book:
  title: Classical Sociological Theory
  subtitle: Lecture Notes
  author: Omar Lizardo 
  date: 8/15/2023
  repo-url: https://github.com/olizardo/classical-sociological-theory-notes
  repo-actions: [source]
  search:
    location: sidebar
    type: textbox
  navbar:
    pinned: true
    background: "#2D68C4"
  sidebar: 
    subtitle: Notes
  page-navigation: true
  chapters:
    - index.qmd
    - lec1.qmd
    - part: marx.qmd
      chapters: 
      - marx-estrangement.qmd
      - marx-soc-econ-history.qmd
      - marx-manifesto.qmd
      - marx-wage-labor.qmd
    - part: weber.qmd
      chapters:
      - weber-prefatory.qmd
      - weber-action-interests.qmd
      - weber-religion-and-action.qmd
      - weber-mentality-capitalism.qmd
    - part: simmel.qmd
      chapters:
      - simmel-group-expansion.qmd
    - part: durkheim.qmd
      chapters:
      - durkheim-definition-of-religion.qmd
    - references.qmd

bibliography: soc30900.bib

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    page-layout: full
    
execute:
  echo: false
  warning: false
  message: false

editor: source
